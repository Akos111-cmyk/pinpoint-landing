  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   #D0D4DC;\n      --text:           #0F1117;\n      --text-2:         #3D4148;\n      --text-3:         #6B7280;\n      --gold:           #C9A84C;\n      --gold-light:     #E8C97A;\n      --gold-bg:        rgba(201,168,76,0.08);\n      --gold-border:    rgba(201,168,76,0.25);\n      --gold-glow:      rgba(201,168,76,0.15);\n      --red-bg:         rgba(239,68,68,0.06);\n      --red-border:     rgba(239,68,68,0.18);\n      --red-text:       #DC2626;\n      --shadow-xs:      0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);\n      --shadow-sm:      0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);\n      --shadow-md:      0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);\n      --shadow-gold:    0 8px 32px rgba(201,168,76,0.18);\n      --radius-sm:      8px;\n      --radius:         12px;\n      --radius-lg:      16px;\n      --radius-xl:      24px;\n      --radius-pill:    100px;\n      --font:           'Plus Jakarta Sans', system-ui, sans-serif;\n      --mono:           'DM Mono', monospace;\n      --nav-h:          68px;\n    }\n\n    html { scroll-behavior: smooth; }\n    body {\n      font-family: var(--font);\n      background: var(--bg);\n      color: var(--text);\n      line-height: 1.6;\n      -webkit-font-smoothing: antialiased;\n      overflow-x: hidden;\n      max-width: 100vw;\n    }\n\n    /* ── Shared ── */\n    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }\n    section { padding: 72px 0; }\n\n    .chip {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      font-family: var(--mono);\n      font-size: 11px;\n      font-weight: 500;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--gold);\n      background: var(--gold-bg);\n      border: 1px solid var(--gold-border);\n      padding: 5px 12px;\n      border-radius: var(--radius-pill);\n      margin-bottom: 16px;\n    }\n\n    .section-title {\n      font-size: clamp(22px, 2.8vw, 32px);\n      font-weight: 800;\n      line-height: 1.2;\n      letter-spacing: -0.02em;\n      color: var(--text);\n    }\n    .section-sub {\n      font-size: 15px;\n      color: var(--text-3);\n      line-height: 1.65;\n      margin-top: 10px;\n    }\n\n    .btn {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      font-family: var(--font);\n      font-size: 13px;\n      font-weight: 600;\n      padding: 9px 20px;\n      border-radius: var(--radius-pill);\n      border: none;\n      cursor: pointer;\n      text-decoration: none;\n      transition: all 0.18s ease;\n      white-space: nowrap;\n    }\n    .btn-gold {\n      background: var(--gold);\n      color: #fff;\n    }\n    .btn-gold:hover {\n      background: var(--gold-light);\n      box-shadow: 0 4px 16px rgba(201,168,76,0.38);\n      transform: translateY(-1px);\n    }\n    .btn-outline {\n      background: transparent;\n      color: var(--text-2);\n      border: 1.5px solid var(--border);\n    }\n    .btn-outline:hover {\n      border-color: var(--border-hover);\n      background: var(--white);\n    }\n    .btn-lg {\n      font-size: 15px;\n      padding: 13px 28px;\n    }\n\n    /* ── Fade-up reveal ── */\n    .reveal {\n      opacity: 0;\n      transform: translateY(22px);\n      transition: opacity 0.55s cubic-bezier(.22,.68,0,1.1), transform 0.55s cubic-bezier(.22,.68,0,1.1);\n    }\n    .reveal.visible { opacity: 1; transform: none; }\n    .reveal.d1 { transition-delay: 0.07s; }\n    .reveal.d2 { transition-delay: 0.14s; }\n    .reveal.d3 { transition-delay: 0.21s; }\n    .reveal.d4 { transition-delay: 0.28s; }\n\n    /* ══════════════════════════════\n       NAVBAR\n    ══════════════════════════════ */\n    .nav {\n      position: fixed;\n      top: 0; left: 0; right: 0;\n      height: var(--nav-h);\n      z-index: 200;\n      display: flex;\n      align-items: center;\n      background: rgba(247,248,250,0.97);\n      backdrop-filter: blur(14px);\n      -webkit-backdrop-filter: blur(14px);\n      box-shadow: 0 1px 0 var(--border);\n      transition: box-shadow 0.25s;\n    }\n    .nav.scrolled {\n      box-shadow: 0 2px 16px rgba(0,0,0,0.07);\n    }\n    .nav-inner {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      width: 100%;\n    }\n    .nav-logo {\n      display: flex;\n      align-items: center;\n      text-decoration: none;\n      flex-shrink: 0;\n      color: var(--text);\n    }\n    .nav-logo svg {\n      display: block;\n      height: 28px;\n      width: auto;\n    }\n    .nav-menu {\n      display: flex;\n      align-items: center;\n      gap: 4px;\n      list-style: none;\n    }\n    .nav-menu a {\n      font-size: 14px;\n      font-weight: 500;\n      color: var(--text-3);\n      text-decoration: none;\n      padding: 6px 14px;\n      border-radius: var(--radius-pill);\n      transition: color 0.15s, background 0.15s;\n    }\n    .nav-menu a:hover { color: var(--text); background: var(--border); }\n    .nav-actions { display: flex; align-items: center; gap: 8px; }\n\n    .hamburger {\n      display: none;\n      flex-direction: column;\n      gap: 4px;\n      padding: 6px;\n      background: none;\n      border: none;\n      cursor: pointer;\n    }\n    .hamburger span {\n      display: block;\n      width: 20px;\n      height: 2px;\n      background: var(--text);\n      border-radius: 2px;\n      transition: transform 0.3s, opacity 0.3s;\n    }\n\n    /* Collapse nav before links wrap */\n    @media (max-width: 1024px) {\n      .nav-menu, .nav-actions { display: none; }\n      .hamburger { display: flex; }\n    }\n\n    .drawer {\n      display: none;\n      position: fixed;\n      top: var(--nav-h);\n      left: 0; right: 0;\n      background: rgba(247,248,250,0.97);\n      backdrop-filter: blur(16px);\n      -webkit-backdrop-filter: blur(16px);\n      border-bottom: 1px solid var(--border);\n      padding: 16px 24px 24px;\n      z-index: 199;\n      flex-direction: column;\n      gap: 4px;\n    }\n    .drawer.open { display: flex; }\n    .drawer a {\n      font-size: 15px;\n      font-weight: 500;\n      color: var(--text-2);\n      text-decoration: none;\n      padding: 10px 12px;\n      border-radius: var(--radius-sm);\n      transition: background 0.15s;\n    }\n    .drawer a:hover { background: var(--border); }\n\n    /* ══════════════════════════════\n       HERO\n    ══════════════════════════════ */\n    .hero {\n      padding-top: calc(var(--nav-h) + 48px);\n      padding-bottom: 0;\n      background: var(--white);\n      position: relative;\n      overflow: hidden;\n    }\n\n    /* Soft grid background */\n    .hero::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background-image:\n        linear-gradient(var(--border) 1px, transparent 1px),\n        linear-gradient(90deg, var(--border) 1px, transparent 1px);\n      background-size: 48px 48px;\n      opacity: 0.5;\n      pointer-events: none;\n      mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 40%, transparent 100%);\n      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 40%, transparent 100%);\n    }\n\n    .hero-inner {\n      position: relative;\n      z-index: 1;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      text-align: center;\n    }\n\n    .hero-badge {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      background: var(--white);\n      border: 1px solid var(--border);\n      border-radius: var(--radius-pill);\n      padding: 6px 16px 6px 8px;\n      margin-bottom: 28px;\n      box-shadow: var(--shadow-xs);\n    }\n    .hero-badge-dot {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      background: var(--gold-bg);\n      border: 1px solid var(--gold-border);\n      color: var(--gold);\n      font-size: 10px;\n      font-weight: 700;\n      font-family: var(--mono);\n      letter-spacing: 0.08em;\n      padding: 3px 8px;\n orm: uppercase;\n      color: var(--text-3);\n      padding: 4px 8px;\n      margin-top: 8px;\n      margin-bottom: 4px;\n    }\n    .db-sidebar-item {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      padding: 7px 8px;\n      border-radius: 6px;\n      font-size: 12px;\n      font-weight: 500;\n      color: var(--text-3);\n      cursor: default;\n    }\n    .db-sidebar-item.active {\n      background: var(--white);\n      color: var(--text);\n      box-shadow: var(--shadow-xs);\n    }\n    .db-sidebar-icon { font-size: 13px; width: 16px; text-align: center; }\n\n    .db-main { flex: 1; padding: 20px; overflow: hidden; }\n\n    .db-metrics {\n      display: grid;\n      grid-template-columns: repeat(3, 1fr);\n      gap: 10px;\n      margin-bottom: 16px;\n    }\n    .db-metric {\n      background: var(--bg);\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      padding: 12px 14px;\n    }\n    .db-metric-label {\n      font-family: var(--mono);\n      font-size: 9px;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      color: var(--text-3);\n      margin-bottom: 6px;\n    }\n    .db-metric-val {\n      font-size: 22px;\n      font-weight: 800;\n      letter-spacing: -0.03em;\n      color: var(--text);\n      line-height: 1;\n    }\n    .db-metric-val.gold { color: var(--gold); }\n    .db-metric-delta {\n      font-size: 11px;\n      font-weight: 600;\n      color: #16A34A;\n      margin-top: 4px;\n    }\n\n    .db-rows { display: flex; flex-direction: column; gap: 6px; }\n    .db-row {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      background: var(--bg);\n      border: 1px solid var(--border);\n      border-radius: 7px;\n      padding: 9px 12px;\n    }\n    .db-row-icon {\n      width: 28px; height: 28px;\n      border-radius: 6px;\n      background: var(--gold-bg);\n      border: 1px solid var(--gold-border);\n      display: flex; align-items: center; justify-content: center;\n step-header\"><div class=\"step-num\">02<\u002Fdiv><div class=\"step-title\">AI Audit<\u002Fdiv><\u002Fdiv>\n          <p class=\"step-desc\">A double-digit list of automation opportunities identified, each quantified by cost and ranked by ROI impact — from quick wins to big swings. Technology recommendations come after, not before.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"step reveal d3\">\n          <div class=\"step-header\"><div class=\"step-num\">03<\u002Fdiv><div class=\"step-title\">Implementation &amp; Results<\u002Fdiv><\u002Fdiv>\n          <p class=\"step-desc\">Custom AI solutions built and deployed, then measured and optimised until results are achieved. Milestones, not vague timelines.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ TESTIMONIALS ══════════ -->\n  <section class=\"testimonials\" id=\"testimonials\">\n    <div class=\"container\">\n      <div class=\"testimonials-header reveal\">\n        <div class=\"chip\">No stranger to the market<\u002Fdiv>\n        <h2 class=\"section-title\">Hear from business leaders<\u002Fh2>\n        <p class=\"section-sub\">Real results from real engagements — not cherry-picked case studies.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"testi-grid\">\n        <div class=\"testi-card reveal d1\">\n          <div class=\"testi-stars\">★★★★★<\u002Fdiv>\n          <p class=\"testi-quote\">\"We weren't prepared for how specific the audit findings would be — that alone was worth it. Now we know exactly where to focus.\"<\u002Fp>\n          <div class=\"testi-author\">\n            <div class=\"testi-avatar\">SR<\u002Fdiv>\n            <div>\n              <div class=\"testi-name\">Smir R.<\u002Fdiv>\n              <div class=\"testi-role\">COO · TRC Group<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"testi-card reveal d2\">\n          <div class=\"testi-stars\">★★★★★<\u002Fdiv>\n          <p class=\"testi-quote\">\"Finally, a partner that thinks before it builds. Our ROI was measurable within 90 days.\"<\u002Fp>\n          <div class=\"testi-author\">\n            <div class=\"testi-avatar\">MV<\u002Fdiv>\n            <div>\n              <div class=\"testi-name\">Maksims V.<\u002Fdiv>\n              <div class=\"testi-role\">CEO · NordaGroup AS<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"testi-card reveal d3\">\n          <div class=\"testi-stars\">★★★★★<\u002Fdiv>\n          <p class=\"testi-quote\">\"The audit-first approach changed everything. We avoided months of costly mistakes.\"<\u002Fp>\n          <div class=\"testi-author\">\n            <div class=\"testi-avatar\">AK<\u002Fdiv>\n            <div>\n              <div class=\"testi-name\">Aina K.<\u002Fdiv>\n              <div class=\"testi-role\">VP Strategy · Fintech Latvia<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ FAQ ══════════ -->\n  <section class=\"faq\" id=\"faq\">\n    <div class=\"container\">\n      <div class=\"faq-header reveal\">\n        <div class=\"chip\">FAQ<\u002Fdiv>\n        <h2 class=\"section-title\">Common questions, straight answers<\u002Fh2>\n        <p class=\"section-sub\">From first conversation to deployed solution — what to expect at every stage.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"faq-list reveal d1\">\n\n        <div class=\"faq-item\">\n          <button class=\"faq-trigger\" aria-expanded=\"false\" aria-controls=\"fq1\" id=\"fqb1\">\n            What do I actually get from the AI Audit?\n            <span class=\"faq-chevron\" aria-hidden=\"true\">▾<\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"faq-panel\" id=\"fq1\" role=\"region\" aria-labelledby=\"fqb1\">\n            <div class=\"faq-panel-inner\">A prioritised roadmap of automation opportunities, each with an estimated implementation cost, projected annual savings, and payback period. You leave with a concrete plan, not a generic slide deck. Every recommendation is specific to your business and backed by data from your own operations.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-trigger\" aria-expanded=\"false\" aria-controls=\"fq2\" id=\"fqb2\">\n            How does the audit actually work?\n            <span class=\"faq-chevron\" aria-hidden=\"true\">▾<\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"faq-panel\" id=\"fq2\" role=\"region\" aria-labelledby=\"fqb2\">\n            <div class=\"faq-panel-inner\">It follows a structured process. First, interviews with the people doing the work — not just management — to surface the real bottlenecks. Then the current workflow is mapped and analysed. Findings cover three types of opportunity: cost reduction (time saved, headcount freed), revenue growth (faster lead response, better conversion, upsell triggers), and quality improvement (fewer errors, more consistent outputs). Everything is ranked by impact and effort, and delivered as a phased executive roadmap.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-trigger\" aria-expanded=\"false\" aria-controls=\"fq4\" id=\"fqb4\">\n            How much time does this take, and will it disrupt my team?\n            <span class=\"faq-chevron\" aria-hidden=\"true\">▾<\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"faq-panel\" id=\"fq4\" role=\"region\" aria-labelledby=\"fqb4\">\n            <div class=\"faq-panel-inner\">The audit starts with a 1–2 hour department workshop, followed by short interviews with 5–10 people from the relevant team. After that, the analytical work happens independently — no ongoing input needed from your side. Quick wins are typically live within 2–4 weeks of the implementation phase starting. During build, a project manager handles all coordination so your team is involved only when it matters.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-trigger\" aria-expanded=\"false\" aria-controls=\"fq5\" id=\"fqb5\">\n            Do you also build and deploy the solutions, or just advise?\n            <span class=\"faq-chevron\" aria-hidden=\"true\">▾<\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"faq-panel\" id=\"fq5\" role=\"region\" aria-labelledby=\"fqb5\">\n            <div class=\"faq-panel-inner\">Both. The full engagement covers build and deployment. Solutions are custom-built, tested, and handed over running — not delivered as a specification for your IT team to figure out. Post-launch, a separate support and maintenance service is available to keep everything running as your business evolves.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-trigger\" aria-expanded=\"false\" aria-controls=\"fq6\" id=\"fqb6\">\n            What if I only want the audit and not the build?\n            <span class=\"faq-chevron\" aria-hidden=\"true\">▾<\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"faq-panel\" id=\"fq6\" role=\"region\" aria-labelledby=\"fqb6\">\n            <div class=\"faq-panel-inner\">The audit deliverable stands on its own — you can take the roadmap and execute it with your own team or another partner. There's no obligation to proceed with implementation. Many clients use the audit to get internal buy-in before committing to a build phase.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"faq-item\">\n          <button class=\"faq-trigger\" aria-expanded=\"false\" aria-controls=\"fq8\" id=\"fqb8\">\n            Do I need an internal IT team for this to work?\n            <span class=\"faq-chevron\" aria-hidden=\"true\">▾<\u002Fspan>\n          <\u002Fbutton>\n          <div class=\"faq-panel\" id=\"fq8\" role=\"region\" aria-labelledby=\"fqb8\">\n            <div class=\"faq-panel-inner\">No. The process is built for business owners and department heads, not engineers. You need access to your own systems and a clear view of your business goals. All technical architecture, integration work, and tool selection is handled — your role is to know your business, not to understand the technology.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ CTA ══════════ -->\n  <section class=\"cta-section\" id=\"cta\">\n    <div class=\"container\">\n      <div class=\"cta-box reveal\">\n        <h2 class=\"section-title\">Ready to find where AI will<br>actually move the needle?<\u002Fh2>\n        <p class=\"section-sub\">Start with a free 30-minute Alignment Call. Walk away with clarity on where AI creates real leverage in your business.<\u002Fp>\n        <a href=\"#\" class=\"btn btn-gold\">Book an Intro →<\u002Fa>\n        <p class=\"cta-trust\">For business leaders focused on sustainable AI investments.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ FOOTER ══════════ -->\n  <footer class=\"footer\">\n    <div class=\"container\">\n      <div class=\"footer-inner\">\n        <div class=\"footer-brand\">\n          <a href=\"#\" class=\"footer-logo\" aria-label=\"Pinpoint AI home\">\n            <svg class=\"logoMark\" viewBox=\"0 0 720 170\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Pinpoint AI\">\n              <text x=\"0\" y=\"130\" fill=\"currentColor\" style=\"font-family:'Inter',sans-serif;font-weight:800;font-size:120px;letter-spacing:-4px;\"><tspan class=\"preI\">P<\u002Ftspan><tspan class=\"dotI\">ı<\u002Ftspan><tspan class=\"postI\">npoint<\u002Ftspan><\u002Ftext>\n              <circle class=\"goldDot\" cx=\"97\" cy=\"38\" r=\"15\" fill=\"#C9A84C\"><\u002Fcircle>\n              <rect x=\"500\" y=\"50\" width=\"3\" height=\"80\" rx=\"1.5\" fill=\"#C8C9CC\"><\u002Frect>\n              <text x=\"520\" y=\"130\" fill=\"#C9A84C\" style=\"font-family:'Inter',sans-serif;font-weight:800;font-size:120px;letter-spacing:-4px;\">AI<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fa>\n          <p class=\"footer-tagline\">Strategy before implementation. Results that last.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"footer-copy\">© 2025 Pinpoint AI. All rights reserved.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <script>\n    // Navbar scroll\n    const nav = document.getElementById('nav');\n    window.addEventListener('scroll', () => {\n      nav.classList.toggle('scrolled', window.scrollY > 40);\n    }, { passive: true });\n\n    // Hamburger\n    const hamburger = document.getElementById('hamburger');\n    const drawer    = document.getElementById('drawer');\n    hamburger.addEventListener('click', () => {\n      const open = drawer.classList.toggle('open');\n      hamburger.setAttribute('aria-expanded', String(open));\n    });\n    function closeDrawer() {\n      drawer.classList.remove('open');\n      hamburger.setAttribute('aria-expanded', 'false');\n    }\n    document.addEventListener('click', e => {\n      if (drawer.classList.contains('open') &&\n          !drawer.contains(e.target) && !hamburger.contains(e.target)) closeDrawer();\n    });\n\n    // Scroll reveal\n    const observer = new IntersectionObserver(entries => {\n      entries.forEach(e => {\n        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -32px 0px' });\n    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n    // FAQ accordion\n    document.querySelectorAll('.faq-trigger').forEach(trigger => {\n      trigger.addEventListener('click', () => {\n        const panel  = document.getElementById(trigger.getAttribute('aria-controls'));\n        const isOpen = trigger.getAttribute('aria-expanded') === 'true';\n        document.querySelectorAll('.faq-trigger').forEach(t => t.setAttribute('aria-expanded', 'false'));\n        document.querySelectorAll('.faq-panel').forEach(p => { p.style.maxHeight = null; });\n        if (!isOpen) {\n          trigger.setAttribute('aria-expanded', 'true');\n          panel.style.maxHeight = panel.scrollHeight + 'px';\n        }\n      });\n    });\n\n    // Smooth scroll\n    document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n      a.addEventListener('click', e => {\n        const href = a.getAttribute('href');\n        if (href === '#') return;\n        const el = document.querySelector(href);\n        if (el) { e.preventDefault(); window.scrollTo({ top: el.offsetTop - 68, behavior: 'smooth' }); }\n      });\n    });\n\n    // Align gold dot on each logo by rasterizing the ı glyph and finding its\n    // actual ink center — getBBox() includes side bearings and would land the\n    // dot off-center. Same technique used in PinPoint Logo.html.\n    function alignDotInSvg(svgEl) {\n      const dotI = svgEl.querySelector('tspan.dotI');\n      const circ = svgEl.querySelector('circle.goldDot');\n      if (!dotI || !circ) return;\n      let iBox;\n      try { iBox = dotI.getBBox(); } catch (_) { return; }\n      if (!iBox.width) return;\n\n      const scale = 4;\n      const w = Math.max(80, Math.ceil(iBox.width * scale) + 80);\n      const h = 720;\n      const cvs = document.createElement('canvas');\n      cvs.width = w; cvs.height = h;\n      const ctx = cvs.getContext('2d');\n      ctx.fillStyle = '#fff';\n      ctx.fillRect(0, 0, w, h);\n      ctx.fillStyle = '#000';\n      ctx.font = `800 ${120 * scale}px Inter, sans-serif`;\n      ctx.textBaseline = 'alphabetic';\n      ctx.fillText('\\u0131', 20, 130 * scale);\n\n      const data = ctx.getImageData(0, 0, w, h).data;\n      let minX = -1, maxX = -1;\n      for (let x = 0; x < w; x++) {\n        for (let y = 0; y < h; y++) {\n          if (data[(y * w + x) * 4] < 128) {\n            if (minX < 0) minX = x;\n            maxX = x;\n            break;\n          }\n        }\n      }\n      if (minX < 0) return;\n      const inkCenterCanvas = (minX + maxX) / 2;\n      const inkOffset = (inkCenterCanvas - 20) / scale;\n      const finalX = iBox.x + inkOffset;\n      circ.setAttribute('cx', finalX.toFixed(2));\n    }\n    function alignLogoDots() {\n      document.querySelectorAll('svg.logoMark').forEach(alignDotInSvg);\n    }\n    if (document.fonts && document.fonts.ready) {\n      document.fonts.ready.then(alignLogoDots);\n    }\n    window.addEventListener('load', alignLogoDots);\n    setTimeout(alignLogoDots, 400);\n    setTimeout(alignLogoDots, 1200);\n    if (document.fonts && document.fonts.ready) {\n      document.fonts.ready.then(alignLogoDots);\n    }\n    window.addEventListener('load', alignLogoDots);\n    alignLogoDots();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
